version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: huuk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-huuk_root_password}
      MYSQL_DATABASE: ${DB_NAME:-huuk}
      MYSQL_USER: ${DB_USER:-huukuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-huuk_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d
    networks:
      - huuk-network

  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huuk-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_USER=${DB_USER:-huukuser}
      - DB_PASSWORD=${DB_PASSWORD:-huuk_password}
      - DB_NAME=${DB_NAME:-huuk}
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASS=${GMAIL_PASS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - db
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/receipts:/app/receipts
    networks:
      - huuk-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: huuk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - huuk-network

volumes:
  mysql_data:
    driver: local

networks:
  huuk-network:
    driver: bridge